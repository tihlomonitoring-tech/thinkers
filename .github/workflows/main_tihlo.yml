# Deploy to Azure App Service (Linux, Node). This workflow does NOT set SQL secrets —
# configure Application settings in the Portal (see docs/azure-hosting.md).
#
# Required on the Web App (Configuration → Application settings):
#   - Database: AZURE_SQL_* or SQLSERVER_* or *_CONNECTION_STRING (see src/db.js)
#   - SESSION_SECRET, NODE_ENV=production
#   - FRONTEND_ORIGIN=https://<your-app>.azurewebsites.net (or custom domain)
# Optional: WEBSITE_NODE_DEFAULT_VERSION ~20 (match package.json engines)
#
# Docs: https://github.com/Azure/webapps-deploy

name: Build and deploy Node.js app to Azure Web App - Tihlo

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Do not set NODE_ENV=production for the build job: npm ci would omit client
# devDependencies (vite, etc.), so `npm run build` fails with exit 127 (vite not found).
env:
  NODE_ENV: production

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # Same App Service for UI + API: keep VITE_API_BASE empty so the client uses same-origin /api.
      # If you ever split the frontend to another host, set VITE_API_BASE here (or via secrets) to https://your-api/api.
      - name: Install, build client, shrink package for App Service
        env:
          VITE_API_BASE: ''
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present
          rm -rf client/node_modules
          npm prune --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_13BD2F3D9026423F9E7D88765F98BEC5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_59D1B174F2324516BEF8F8B1FA4A3E15 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_676FF9F68DDB4B45B8A26E6255F46C76 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Tihlo'
          slot-name: 'Production'
          package: .
          